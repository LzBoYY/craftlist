<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CraftList - Marketplace Listing Generator</title>
<style>
  body { font-family: Arial, sans-serif; margin: 20px; background: #fafafa; color: #333; }
  h1, h2 { color: #222; }
  .input-container { display: flex; flex-direction: column; max-width: 400px; margin-bottom: 20px; }
  input, button { padding: 10px; font-size: 14px; margin-bottom: 10px; width: 100%; box-sizing: border-box; }
  button { cursor: pointer; }
  #output { display: flex; flex-direction: column; gap: 15px; max-width: 600px; }

  .field-container { display: flex; flex-direction: column; gap: 5px; }
  .field-label-container { display: flex; align-items: center; justify-content: space-between; }
  .field-label { font-weight: bold; }
  .field-box {
    background: #fff;
    border: 1px solid #ccc;
    padding: 8px;
    border-radius: 4px;
    white-space: pre-wrap;
  }
  .copy-btn {
  cursor: pointer;
  border: none;
  background: transparent;
  font-size: 16px;
  padding: 0;
  width: 24px;
  height: 24px;
  line-height: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}
  #newListingBtn { margin-top: 20px; width: 200px; }
</style>
</head>
<body>

<h1>CraftList</h1>
<h2>Generate Marketplace Listing</h2>

<div class="input-container">
  <input type="text" id="itemName" placeholder="Item Name" />
  <input type="text" id="condition" placeholder="Condition (optional)" />
  <input type="text" id="brand" placeholder="Brand (optional)" />
  <button id="generateBtn">Generate Listing</button>
</div>

<div id="output">Your listing will appear here...</div>

<script>
const generateBtn = document.getElementById('generateBtn');
const output = document.getElementById('output');

function createCopyButton(textToCopy) {
  const btn = document.createElement('button');
  btn.className = "copy-btn";
  btn.textContent = "📋";
  btn.addEventListener('click', () => {
    navigator.clipboard.writeText(textToCopy).then(() => {
      btn.textContent = "✅";
      setTimeout(() => btn.textContent = "📋", 1500);
    });
  });
  return btn;
}

function clearForm() {
  document.getElementById('itemName').value = "";
  document.getElementById('condition').value = "";
  document.getElementById('brand').value = "";
  output.innerHTML = "Your listing will appear here...";
}

generateBtn.addEventListener('click', async () => {
  const itemName = document.getElementById('itemName').value.trim();
  const condition = document.getElementById('condition').value.trim();
  const brand = document.getElementById('brand').value.trim();

  if (!itemName) {
    output.innerText = "Please enter an item name";
    return;
  }

  output.innerHTML = "Generating listing...";

  try {
    const res = await fetch("/api/generate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ itemName, condition, brand })
    });

    const data = await res.json();

    if (data.error) {
      output.innerText = "Error: " + data.error;
      return;
    }

    let listing;
    try {
      listing = JSON.parse(data.listing);
    } catch {
      listing = { raw: data.listing };
    }

    output.innerHTML = "";

    function addField(label, text) {
      const fieldContainer = document.createElement('div');
      fieldContainer.className = "field-container";

      const labelContainer = document.createElement('div');
      labelContainer.className = "field-label-container";

      const labelDiv = document.createElement('div');
      labelDiv.className = "field-label";
      labelDiv.textContent = label;

      const copyBtn = createCopyButton(text);

      labelContainer.appendChild(labelDiv);
      labelContainer.appendChild(copyBtn);

      const fieldBox = document.createElement('div');
      fieldBox.className = "field-box";
      fieldBox.textContent = text;

      fieldContainer.appendChild(labelContainer);
      fieldContainer.appendChild(fieldBox);
      output.appendChild(fieldContainer);
    }

    if (listing.raw) {
      addField("RAW OUTPUT", listing.raw);
    } else {
      addField("TITLE", listing.title);
      addField("DESCRIPTION", listing.description);
      addField("PRICE RANGE", listing.price_range);
      addField("TAGS", listing.tags.join(", "));
    }

    // Add New Listing button
    const newListingBtn = document.createElement('button');
    newListingBtn.id = "newListingBtn";
    newListingBtn.textContent = "New Listing";
    newListingBtn.addEventListener('click', clearForm);
    output.appendChild(newListingBtn);

  } catch (err) {
    output.innerText = "Failed to generate listing";
    console.error(err);
  }
});
</script>

</body>
</html>
