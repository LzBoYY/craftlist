<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CraftList - Marketplace Listing Generator</title>
<style>
  body { font-family: Arial, sans-serif; margin: 20px; background: #fafafa; color: #333; }
  h1, h2 { color: #222; }
  .input-container {
    display: flex;
    flex-direction: column;
    max-width: 400px;
    margin-bottom: 20px;
  }
  input, button {
    padding: 10px;
    font-size: 14px;
    margin-bottom: 10px;
    width: 100%;
    box-sizing: border-box;
  }
  button { cursor: pointer; }
  #output {
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-width: 400px;
  }
  .field-box {
    background: #fff;
    border: 1px solid #ccc;
    padding: 10px;
    border-radius: 4px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .field-title {
    font-weight: bold;
    margin-bottom: 5px;
  }
  .copy-btn {
    cursor: pointer;
    border: none;
    background: transparent;
    font-size: 16px;
    margin-left: 10px;
  }
  .field-content {
    flex-grow: 1;
    margin-right: 10px;
  }
</style>
</head>
<body>

<h1>CraftList</h1>
<h2>Generate Marketplace Listing</h2>

<div class="input-container">
  <input type="text" id="itemName" placeholder="Item Name" />
  <input type="text" id="condition" placeholder="Condition (optional)" />
  <input type="text" id="brand" placeholder="Brand (optional)" />
  <button id="generateBtn">Generate Listing</button>
</div>

<div id="output">Your listing will appear here...</div>

<script>
const generateBtn = document.getElementById('generateBtn');
const output = document.getElementById('output');

function createCopyButton(textToCopy) {
  const btn = document.createElement('button');
  btn.className = "copy-btn";
  btn.textContent = "📋";
  btn.addEventListener('click', () => {
    navigator.clipboard.writeText(textToCopy).then(() => {
      btn.textContent = "✅";
      setTimeout(() => btn.textContent = "📋", 1500);
    });
  });
  return btn;
}

generateBtn.addEventListener('click', async () => {
  const itemName = document.getElementById('itemName').value.trim();
  const condition = document.getElementById('condition').value.trim();
  const brand = document.getElementById('brand').value.trim();

  if (!itemName) {
    output.innerText = "Please enter an item name";
    return;
  }

  output.innerHTML = "Generating listing...";

  try {
    const res = await fetch("/api/generate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ itemName, condition, brand })
    });

    const data = await res.json();

    if (data.error) {
      output.innerText = "Error: " + data.error;
      return;
    }

    let listing;
    try {
      listing = JSON.parse(data.listing);
    } catch {
      listing = { raw: data.listing };
    }

    output.innerHTML = "";

    if (listing.raw) {
      const box = document.createElement('div');
      box.className = "field-box";
      const content = document.createElement('div');
      content.className = "field-content";
      content.textContent = listing.raw;
      const btn = createCopyButton(listing.raw);
      box.appendChild(content);
      box.appendChild(btn);
      output.appendChild(box);
    } else {
      for (const key of ["title","description","price_range"]) {
        const box = document.createElement('div');
        box.className = "field-box";
        const contentContainer = document.createElement('div');
        contentContainer.style.display = "flex";
        contentContainer.style.flexDirection = "column";
        const titleDiv = document.createElement('div');
        titleDiv.className = "field-title";
        titleDiv.textContent = key.replace("_"," ").toUpperCase();
        const content = document.createElement('div');
        content.className = "field-content";
        content.textContent = listing[key];
        contentContainer.appendChild(titleDiv);
        contentContainer.appendChild(content);
        const btn = createCopyButton(listing[key]);
        box.appendChild(contentContainer);
        box.appendChild(btn);
        output.appendChild(box);
      }
      const boxTags = document.createElement('div');
      boxTags.className = "field-box";
      const contentContainer = document.createElement('div');
      contentContainer.style.display = "flex";
      contentContainer.style.flexDirection = "column";
      const titleDiv = document.createElement('div');
      titleDiv.className = "field-title";
      titleDiv.textContent = "TAGS";
      const content = document.createElement('div');
      content.className = "field-content";
      content.textContent = listing.tags.join(", ");
      contentContainer.appendChild(titleDiv);
      contentContainer.appendChild(content);
      const btnTags = createCopyButton(listing.tags.join(", "));
      boxTags.appendChild(contentContainer);
      boxTags.appendChild(btnTags);
      output.appendChild(boxTags);
    }

  } catch (err) {
    output.innerText = "Failed to generate listing";
    console.error(err);
  }
});
</script>

</body>
</html>
