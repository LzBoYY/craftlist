<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CraftList - Marketplace Listing Generator</title>
<style>
  body { font-family: Arial, sans-serif; margin: 20px; background: #fafafa; color: #333; }
  h1, h2 { color: #222; }
  input, button { padding: 10px; font-size: 14px; width: 100%; margin-bottom: 10px; box-sizing: border-box; }
  button { cursor: pointer; }
  #output { margin-top: 20px; }
  .field-box {
    background: #fff; border: 1px solid #ccc; padding: 12px; margin-bottom: 10px;
    position: relative; border-radius: 4px;
  }
  .field-box .copy-btn {
    position: absolute; top: 10px; right: 10px; cursor: pointer; border: none;
    background: transparent; font-size: 16px;
  }
  .field-title { font-weight: bold; margin-bottom: 6px; }
</style>
</head>
<body>

<h1>CraftList</h1>
<h2>Generate Marketplace Listing</h2>

<input type="text" id="itemName" placeholder="Item Name" />
<input type="text" id="condition" placeholder="Condition (optional)" />
<input type="text" id="brand" placeholder="Brand (optional)" />
<button id="generateBtn">Generate Listing</button>

<div id="output">Your listing will appear here...</div>

<script>
const generateBtn = document.getElementById('generateBtn');
const output = document.getElementById('output');

function createCopyButton(textToCopy) {
  const btn = document.createElement('button');
  btn.className = "copy-btn";
  btn.textContent = "📋";
  btn.addEventListener('click', () => {
    navigator.clipboard.writeText(textToCopy).then(() => {
      btn.textContent = "✅";
      setTimeout(() => btn.textContent = "📋", 1500);
    });
  });
  return btn;
}

generateBtn.addEventListener('click', async () => {
  const itemName = document.getElementById('itemName').value.trim();
  const condition = document.getElementById('condition').value.trim();
  const brand = document.getElementById('brand').value.trim();

  if (!itemName) {
    output.innerText = "Please enter an item name";
    return;
  }

  output.innerHTML = "Generating listing...";

  try {
    const res = await fetch("/api/generate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ itemName, condition, brand })
    });

    const data = await res.json();

    if (data.error) {
      output.innerText = "Error: " + data.error;
      return;
    }

    let listing;
    try {
      listing = JSON.parse(data.listing);
    } catch {
      listing = { raw: data.listing };
    }

    output.innerHTML = "";

    if (listing.raw) {
      const box = document.createElement('div');
      box.className = "field-box";
      box.textContent = listing.raw;
      output.appendChild(box);
    } else {
      for (const key of ["title","description","price_range"]) {
        const box = document.createElement('div');
        box.className = "field-box";
        const p = document.createElement('div');
        p.className = "field-title";
        p.textContent = key.replace("_"," ").toUpperCase();
        const content = document.createElement('div');
        content.textContent = listing[key];
        const btn = createCopyButton(listing[key]);
        box.appendChild(p);
        box.appendChild(content);
        box.appendChild(btn);
        output.appendChild(box);
      }
      // tags
      const boxTags = document.createElement('div');
      boxTags.className = "field-box";
      const pTags = document.createElement('div');
      pTags.className = "field-title";
      pTags.textContent = "TAGS";
      const contentTags = document.createElement('div');
      contentTags.textContent = listing.tags.join(", ");
      const btnTags = createCopyButton(listing.tags.join(", "));
      boxTags.appendChild(pTags);
      boxTags.appendChild(contentTags);
      boxTags.appendChild(btnTags);
      output.appendChild(boxTags);
    }

  } catch (err) {
    output.innerText = "Failed to generate listing";
    console.error(err);
  }
});
</script>

</body>
</html>
