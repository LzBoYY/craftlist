<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CraftList - Marketplace Listing Generator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #fafafa;
      color: #333;
    }
    h1, h2 { color: #222; }
    input, button {
      padding: 8px;
      margin: 5px 0;
      width: 300px;
      font-size: 14px;
    }
    button {
      cursor: pointer;
    }
    #output {
      margin-top: 20px;
      background: #fff;
      padding: 15px;
      border: 1px solid #ccc;
      white-space: pre-wrap;
    }
    .output-line {
      display: flex;
      align-items: center;
      margin-bottom: 8px;
    }
    .output-line p {
      margin: 0;
    }
    .copy-btn {
      margin-left: 10px;
      padding: 3px 8px;
      font-size: 12px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>CraftList</h1>
<h2>Generate Marketplace Listing</h2>

<input type="text" id="itemName" placeholder="Item Name" />
<input type="text" id="condition" placeholder="Condition (optional)" />
<input type="text" id="brand" placeholder="Brand (optional)" />
<br>
<button id="generateBtn">Generate Listing</button>

<div id="output">Your listing will appear here...</div>

<script>
  const generateBtn = document.getElementById('generateBtn');
  const output = document.getElementById('output');

  function createCopyButton(textToCopy) {
    const btn = document.createElement('button');
    btn.textContent = "Copy";
    btn.className = "copy-btn";
    btn.addEventListener('click', () => {
      navigator.clipboard.writeText(textToCopy).then(() => {
        btn.textContent = "Copied!";
        setTimeout(() => btn.textContent = "Copy", 1500);
      });
    });
    return btn;
  }

  generateBtn.addEventListener('click', async () => {
    const itemName = document.getElementById('itemName').value.trim();
    const condition = document.getElementById('condition').value.trim();
    const brand = document.getElementById('brand').value.trim();

    if (!itemName) {
      output.innerText = "Please enter an item name";
      return;
    }

    output.innerText = "Generating listing...";

    try {
      const res = await fetch("/api/generate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ itemName, condition, brand })
      });

      const data = await res.json();

      if (data.error) {
        output.innerText = "Error: " + data.error;
        return;
      }

      let listing;
      try {
        listing = JSON.parse(data.listing);
      } catch {
        listing = { raw: data.listing };
      }

      output.innerHTML = "";

      if (listing.raw) {
        const div = document.createElement('div');
        div.className = "output-line";
        const p = document.createElement('p');
        p.textContent = listing.raw;
        const btn = createCopyButton(listing.raw);
        div.appendChild(p);
        div.appendChild(btn);
        output.appendChild(div);
      } else {
        for (const key of ["title","description","price_range"]) {
          const div = document.createElement('div');
          div.className = "output-line";
          const p = document.createElement('p');
          p.textContent = `${key.replace("_"," ")}: ${listing[key]}`;
          const btn = createCopyButton(listing[key]);
          div.appendChild(p);
          div.appendChild(btn);
          output.appendChild(div);
        }
        const divTags = document.createElement('div');
        divTags.className = "output-line";
        const pTags = document.createElement('p');
        pTags.textContent = `tags: ${listing.tags.join(", ")}`;
        const btnTags = createCopyButton(listing.tags.join(", "));
        divTags.appendChild(pTags);
        divTags.appendChild(btnTags);
        output.appendChild(divTags);
      }

    } catch (err) {
      output.innerText = "Failed to generate listing";
      console.error(err);
    }
  });
</script>

</body>
</html>
