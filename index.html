<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CraftList Generator</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    input, button { padding: 8px; margin: 5px 0; width: 300px; }
    #output { margin-top: 20px; white-space: pre-wrap; background: #f5f5f5; padding: 10px; }
  </style>
</head>
<body>

<h2>Generate Marketplace Listing</h2>

<input type="text" id="itemName" placeholder="Item Name" />
<input type="text" id="condition" placeholder="Condition (optional)" />
<input type="text" id="brand" placeholder="Brand (optional)" />
<br>
<button id="generateBtn">Generate Listing</button>

<div id="output">Output will appear here...</div>

<script>
  const generateBtn = document.getElementById('generateBtn');
  const output = document.getElementById('output');

  generateBtn.addEventListener('click', async () => {
    const itemName = document.getElementById('itemName').value.trim();
    const condition = document.getElementById('condition').value.trim();
    const brand = document.getElementById('brand').value.trim();

    if (!itemName) {
      output.innerText = "Please enter an item name";
      return;
    }

    output.innerText = "Generating listing...";

    try {
      const res = await fetch("/api/generate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ itemName, condition, brand })
      });

      const data = await res.json();

      if (data.error) {
        output.innerText = "Error: " + data.error;
        return;
      }

      // Parse AI JSON if needed
      let listing;
      try {
        listing = JSON.parse(data.listing);
      } catch {
        listing = { raw: data.listing };
      }

      if (listing.raw) {
        output.innerText = listing.raw;
      } else {
        output.innerText = 
          `Title: ${listing.title}\n\n` +
          `Description: ${listing.description}\n\n` +
          `Price Range: ${listing.price_range}\n\n` +
          `Tags: ${listing.tags.join(", ")}`;
      }

    } catch (err) {
      output.innerText = "Failed to generate listing";
      console.error(err);
    }
  });
</script>

</body>
</html>
