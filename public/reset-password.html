<!-- reset-password.html -->

<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>New Password - CraftList</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <style>

    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 400px;
      margin: auto;
      background: #f9f9f9;
    }

    h1 {
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 15px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 10px;
      cursor: pointer;
      border: 1px solid #ccc;
      background: white;
      border-radius: 4px;
    }

    .message {
      margin-top: 15px;
      text-align: center;
      font-weight: bold;
    }

  </style>

</head>

<body>

  <h1>Set New Password</h1>

  <input
    type="password"
    id="password"
    placeholder="Enter new password"
  />

  <button id="saveBtn">
    Save Password
  </button>

  <div
    class="message"
    id="message"
  ></div>

  <script>

    document.addEventListener("DOMContentLoaded", () => {

      const supabaseUrl =
        "https://umvpigxwceekndxnyrmi.supabase.co";

      const supabaseKey =
        "sb_publishable_4UiI7fMJCoGKUnbhzwYkTg_0_r8F2Vz";

      const supabase =
        window.supabase.createClient(
          supabaseUrl,
          supabaseKey
        );

      const saveBtn =
        document.getElementById("saveBtn");

      const message =
        document.getElementById("message");

      saveBtn.addEventListener("click", async () => {

        const password =
          document
            .getElementById("password")
            .value
            .trim();

        if (!password) {

          message.innerText =
            "Please enter a password";

          return;
        }

        const { error } =
          await supabase.auth.updateUser({
            password
          });

        if (error) {

          message.innerText =
            error.message;

          return;
        }

        message.innerText =
          "Password updated successfully";

        setTimeout(() => {

          window.location.href =
            "/login.html";

        }, 2000);

      });

    });

  </script>

</body>
</html>
