<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Create Account - ListCraft</title>

  <!-- SUPABASE -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>

    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 450px;
      margin: auto;
      background: #f9f9f9;
    }

    h1 {
      text-align: center;
      margin-bottom: 5px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 25px;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }

    input,
    select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: white;
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      cursor: pointer;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: white;
      font-size: 15px;
    }

    button:hover {
      background: #f0f0f0;
    }

    .link {
      margin-top: 20px;
      text-align: center;
      color: #007bff;
      cursor: pointer;
    }

    .error {
      margin-top: 20px;
      color: red;
      font-weight: bold;
      text-align: center;
    }

    .success {
      margin-top: 20px;
      color: green;
      font-weight: bold;
      text-align: center;
    }

  </style>
</head>

<body>

  <h1>ListCraft</h1>

  <div class="subtitle">
    Create your account
  </div>

  <label for="email">
    Email Address
  </label>

  <input
    type="email"
    id="email"
    placeholder="Enter your email"
  />

  <label for="password">
    Password
  </label>

  <input
    type="password"
    id="password"
    placeholder="Enter your password"
  />

  <label for="phone">
    Phone Number (Optional)
  </label>

  <input
    type="text"
    id="phone"
    placeholder="Enter your phone number"
  />

  <label for="country">
    Country
  </label>

  <select id="country">

    <option value="Other" selected>
      Other
    </option>

    <option value="Belgium">
      Belgium
    </option>

    <option value="Netherlands">
      Netherlands
    </option>

    <option value="Germany">
      Germany
    </option>

    <option value="France">
      France
    </option>

    <option value="United Kingdom">
      United Kingdom
    </option>

    <option value="United States">
      United States
    </option>

  </select>

  <label for="currency">
    Currency
  </label>

  <select id="currency">

    <option value="EUR" selected>
      Euro (€)
    </option>

    <option value="USD">
      US Dollar ($)
    </option>

    <option value="GBP">
      British Pound (£)
    </option>

  </select>

  <button id="registerBtn">
    Create Account
  </button>

  <div class="error" id="errorMsg"></div>

  <div class="success" id="successMsg"></div>

  <div
    class="link"
    id="loginLink"
  >
    Back To Login
  </div>

  <script>

    document.addEventListener("DOMContentLoaded", () => {

      // SUPABASE CLIENT

      const supabaseUrl =
        "https://umvpigxwceekndxnyrmi.supabase.co";

      const supabaseKey =
        "sb_publishable_4UiI7fMJCoGKUnbhzwYkTg_0_r8F2Vz";

      const supabase =
        window.supabase.createClient(
          supabaseUrl,
          supabaseKey
        );

      // ELEMENTS

      const registerBtn =
        document.getElementById("registerBtn");

      const loginLink =
        document.getElementById("loginLink");

      const errorMsg =
        document.getElementById("errorMsg");

      const successMsg =
        document.getElementById("successMsg");

      // REGISTER

      registerBtn.addEventListener("click", async () => {

        errorMsg.innerText = "";
        successMsg.innerText = "";

        const email =
          document.getElementById("email").value.trim();

        const password =
          document.getElementById("password").value.trim();

        const phone =
          document.getElementById("phone").value.trim();

        const country =
          document.getElementById("country").value;

        const currency =
          document.getElementById("currency").value;

        // VALIDATION

        if (!email || !password) {

          errorMsg.innerText =
            "Please fill in all required fields";

          return;
        }

        // CREATE AUTH USER

        const {
          data: authData,
          error: authError
        } = await supabase.auth.signUp({

          email,
          password

        });

        if (authError) {

          errorMsg.innerText =
            authError.message;

          return;
        }

        // GET USER

        const user =
          authData.user;

        if (!user) {

          errorMsg.innerText =
            "Failed to create user";

          return;
        }

        // CREATE PROFILE

        const {
  error: profileError
} = await supabase
  .from("profiles")
  .insert([{

    id: user.id,
    email: email,
    country: country || "Other",
    currency: currency || "EUR",
    credits: 10,
    pro: false

  }]);

        if (profileError) {

          console.error(profileError);

          errorMsg.innerText =
            "Failed to create profile";

          return;
        }

        // SUCCESS

        successMsg.innerText =
          "Account created successfully";

        setTimeout(() => {

          window.location.href =
            "login.html";

        }, 1000);

      });

      // LOGIN LINK

      loginLink.addEventListener("click", () => {

        window.location.href =
          "login.html";

      });

    });

  </script>

</body>
</html>
