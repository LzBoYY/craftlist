<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>History - ListCraft</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>

    body {
      font-family: Arial, sans-serif;
      max-width: 1000px;
      margin: auto;
      padding: 20px;
      background: #f9f9f9;
    }

    h1 {
      margin-bottom: 20px;
    }

    button {
      padding: 10px 14px;
      cursor: pointer;
      border: 1px solid #ccc;
      background: white;
      border-radius: 4px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: white;
    }

    th,
    td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: left;
    }

    .details {
  padding: 15px;
  background: #fafafa;
  line-height: 1.6;
}
    .historyImage {
  width: 50px;
  height: 50px;
  object-fit: cover;
  border-radius: 4px;
  margin-right: 4px;
}

#searchBox {
  width: 100%;
  padding: 10px;
  margin-bottom: 15px;
  box-sizing: border-box;
  border: 1px solid #ddd;
  border-radius: 4px;
}

  </style>

</head>

<body>

  <button id="backBtn">
    ← Back
  </button>

  <h1>Generation History</h1>

<input
  type="text"
  id="searchBox"
  placeholder="Search history..."
>

<button id="deleteAllBtn">
  Delete All
</button>

<table>

  <thead>
  <tr>
    <th>Date</th>
    <th>Item</th>
    <th>Title</th>
    <th>Images</th>
    <th>View</th>
    <th>Delete</th>
    
  </tr>
</thead>

    <tbody id="historyTable"></tbody>

  </table>

<script>

const supabaseClient = window.supabase.createClient(
  "https://umvpigxwceekndxnyrmi.supabase.co",
  "sb_publishable_4UiI7fMJCoGKUnbhzwYkTg_0_r8F2Vz"
);

document.getElementById("backBtn").addEventListener("click", () => {
  window.location.href = "index.html";
});

async function loadHistory() {

 const {
  data: { user }
} = await supabaseClient.auth.getUser();

const { data, error } = await supabaseClient
  .from("generations")
.select("*")
.eq("user_id", user.id)
.order("created_at", { ascending: false })
.limit(30);

  if (error) {
    console.error(error);
    return;
  }

  const table =
    document.getElementById("historyTable");

 table.innerHTML = "";

const search =
  document
    .getElementById("searchBox")
    ?.value
    .toLowerCase() || "";

data
.filter(item =>

  item.item_name?.toLowerCase().includes(search)

  ||

  item.title?.toLowerCase().includes(search)

  ||

  (item.tags || [])
    .join(" ")
    .toLowerCase()
    .includes(search)

)
.forEach((item, index) => {

    table.innerHTML += `
  <tr>

    <td>
      ${new Date(item.created_at).toLocaleString()}
    </td>

    <td>
      ${item.item_name}
    </td>

    <td>
      ${item.title}
    </td>

    <td>
  ${(item.images || []).map(url => `
    <img src="${url}" class="historyImage">
  `).join("")}
</td>

    <td>
      <button onclick="toggleDetails(${index})">
        View
      </button>
    </td>

    <td>
      <button onclick="deleteGeneration('${item.id}')">
        Delete
      </button>
    </td>

  </tr>

      <tr
        id="details-${index}"
        style="display:none;"
      >
        <td colspan="3">

          <div class="details">

  <div>
    <strong>Description</strong>
  </div>

  <div>
    ${item.description}
  </div>

  <br>

  <div>
    <strong>Price Range</strong>
  </div>

  <div>
    ${item.price_range}
  </div>

  <br>

  <div>
    <strong>Tags</strong>
  </div>

  <div>
    ${(item.tags || []).join(", ")}
  </div>

</div>

        </td>
      </tr>
    `;
  });

}

window.toggleDetails = (index) => {

  const row =
    document.getElementById(`details-${index}`);

  row.style.display =
    row.style.display === "none"
      ? ""
      : "none";
};
window.deleteGeneration = async (id) => {

  if (!confirm("Delete this listing?")) {
    return;
  }

  const { error } = await supabaseClient
    .from("generations")
    .delete()
    .eq("id", id);

  if (error) {

  console.error(error);
  alert(error.message);

  return;
}


  loadHistory();

};
document
  .getElementById("deleteAllBtn")
  .addEventListener("click", async () => {

    if (!confirm("Delete ALL your listings?")) {
      return;
    }

    const {
      data: { user }
    } = await supabaseClient.auth.getUser();

    if (!user) {
      alert("Not logged in");
      return;
    }

    const { error } = await supabaseClient
      .from("generations")
      .delete()
      .eq("user_id", user.id);

    if (error) {

      console.error(error);
      alert(error.message);

      return;
    }

    loadHistory();

});
  
document
  .getElementById("searchBox")
  .addEventListener("input", loadHistory);

loadHistory();

</script>

</body>
</html>
