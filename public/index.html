<!DOCTYPE html>
<html lang="en">
<head>

  
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ListCraft</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/js/supabase.js"></script>
  
  <!-- SUPABASE -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>

    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 700px;
      margin: auto;
      background: #f9f9f9;
      color: #333;
    }

    h1 {
      text-align: center;
      margin-bottom: 5px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 25px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      gap: 10px;
      flex-wrap: wrap;
    }

   .nav-buttons {
  display: flex;
  align-items: center;
  gap: 6px;
}
    .nav-buttons button,
.credits {
  height: 34px;
}
    .credits {
  display: flex;
  align-items: center;
  padding: 0 10px;
  border: 1px solid #ccc;
  border-radius: 4px;
  background: white;
}

    button {
      padding: 10px 14px;
      cursor: pointer;
      border: 1px solid #ccc;
      background: white;
      border-radius: 4px;
      font-size: 14px;
    }

    button:hover {
      background: #f0f0f0;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }

    input[type="text"] {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: white;
    }

    .char-counter {
      text-align: right;
      font-size: 12px;
      color: #777;
      margin-top: 3px;
    }

    .error {
      margin-top: 15px;
      color: red;
      font-weight: bold;
      text-align: center;
    }

    .loading {
      margin-top: 20px;
      font-style: italic;
      color: #666;
      text-align: center;
    }

    .output-container {
      margin-top: 25px;
      display: none;
      flex-direction: column;
      gap: 8px;
    }

    .field-container {
      background: white;
      border: 1px solid #ddd;
      border-radius: 5px;
      padding: 12px;
    }

    .field-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .field-title {
      font-weight: bold;
      font-size: 15px;
    }

    .copy-btn {
      cursor: pointer;
      border: none;
      background: transparent;
      font-size: 16px;
      padding: 0;
      width: 24px;
      height: 24px;
    }

    .field-content {
      white-space: pre-wrap;
      line-height: 1.5;
    }

    #newListingBtn {
      margin-top: 10px;
    }

  </style>

</head>

<body>

  <div class="top-bar">

    <div>
      <strong>ListCraft</strong>
    </div>

   <div class="nav-buttons">

  <div id="creditDisplay" class="credits">
    💰 <span id="creditCount">0</span>
  </div>

  <button onclick="window.location.href='account.html'">
    Account
  </button>

  <button onclick="window.location.href='shop.html'">
    Shop
  </button>

  <button onclick="window.location.href='history.html'">
  History
</button>
     
  <button id="logoutBtn">
    Logout
  </button>

</div>

  </div>

  <h1>ListCraft</h1>

  <div class="subtitle">
    Marketplace listings in seconds!
  </div>

  <label for="itemName">
    Item Name
  </label>

  <input
    type="text"
    id="itemName"
    maxlength="120"
    placeholder="Example: iPhone 14 Pro"
  />

  <div class="char-counter" id="itemCounter">
    0 / 120
  </div>

  <label for="condition">
    Condition (Optional)
  </label>

  <input
    type="text"
    id="condition"
    maxlength="60"
    placeholder="Example: Used - Excellent"
  />

  <label for="brand">
    Brand (Optional)
  </label>

  <input
    type="text"
    id="brand"
    maxlength="60"
    placeholder="Example: Apple"
  />

  <button id="generateBtn">
    Generate Listing
  </button>

  <div class="error" id="errorMsg"></div>

  <div class="loading" id="loadingMsg"></div>

  <div class="output-container" id="outputContainer">

    <div class="field-container">

      <div class="field-header">

        <div class="field-title">
          Title
        </div>

        <button
          class="copy-btn"
          onclick="copyField('titleContent')"
        >
          📋
        </button>

      </div>

      <div class="field-content" id="titleContent"></div>

    </div>

    <div class="field-container">

      <div class="field-header">

        <div class="field-title">
          Description
        </div>

        <button
          class="copy-btn"
          onclick="copyField('descriptionContent')"
        >
          📋
        </button>

      </div>

      <div class="field-content" id="descriptionContent"></div>

    </div>

    <div class="field-container">

      <div class="field-header">

        <div class="field-title">
          Price Range
        </div>

        <button
          class="copy-btn"
          onclick="copyField('priceContent')"
        >
          📋
        </button>

      </div>

      <div class="field-content" id="priceContent"></div>

    </div>

    <div class="field-container">

      <div class="field-header">

        <div class="field-title">
          Tags
        </div>

        <button
          class="copy-btn"
          onclick="copyField('tagsContent')"
        >
          📋
        </button>

      </div>

      <div class="field-content" id="tagsContent"></div>

    </div>

    <button id="newListingBtn">
      New Listing
    </button>

  </div>

  <script>

    document.addEventListener("DOMContentLoaded", async () => {

      // SUPABASE
const {
  data: { session }
} = await window.supabaseClient.auth.getSession();

console.log("SESSION:", session);

if (!session) {

  window.location.href = "/login.html";
  return;

}
      const supabaseUrl =
        "https://umvpigxwceekndxnyrmi.supabase.co";

      const supabaseKey =
        "sb_publishable_4UiI7fMJCoGKUnbhzwYkTg_0_r8F2Vz";

     
   async function loadCredits() {

  const { data: userData } = await window.supabaseClient.auth.getUser();

  if (!userData?.user) return;

  const { data, error } = await supabase
    window.supabaseClient.from("profiles")
    .select("credits")
    .eq("id", userData.user.id)
    .single();

  if (error) {
    console.error("Credit fetch error:", error);
    return;
  }

  document.getElementById("creditCount").innerText =
    data.credits ?? 0;
}
      

      // AUTH CHECK

      const {
        data: { user }
      } = await window.supabaseClient.auth.getUser();

      if (!user) {

        window.location.href =
          "login.html";

        return;
      }
await loadCredits();
      console.log("Logged in:", user.email);

      // ELEMENTS

      const itemNameInput =
        document.getElementById("itemName");

      const conditionInput =
        document.getElementById("condition");

      const brandInput =
        document.getElementById("brand");

      const itemCounter =
        document.getElementById("itemCounter");

      const generateBtn =
        document.getElementById("generateBtn");

   
      const logoutBtn =
        document.getElementById("logoutBtn");

      const errorMsg =
        document.getElementById("errorMsg");

      const loadingMsg =
        document.getElementById("loadingMsg");

      const outputContainer =
        document.getElementById("outputContainer");

      const titleContent =
        document.getElementById("titleContent");

      const descriptionContent =
        document.getElementById("descriptionContent");

      const priceContent =
        document.getElementById("priceContent");

      const tagsContent =
        document.getElementById("tagsContent");

      const newListingBtn =
        document.getElementById("newListingBtn");

      // COUNTER

      itemNameInput.addEventListener("input", () => {

        itemCounter.textContent =
          `${itemNameInput.value.length} / 120`;

      });

      // COPY FUNCTION

      window.copyField = (id) => {

        const text =
          document.getElementById(id).innerText;

        navigator.clipboard.writeText(text);

      };

      // LOGOUT

      logoutBtn.addEventListener("click", async () => {

        await window.supabaseClient.auth.signOut();

        window.location.href =
          "login.html";

      });

      // GENERATE LISTING

      generateBtn.addEventListener("click", async () => {

        errorMsg.innerText = "";
        loadingMsg.innerText = "";

        const itemName =
          itemNameInput.value.trim();

        const condition =
          conditionInput.value.trim();

        const brand =
          brandInput.value.trim();

        if (!itemName) {

          errorMsg.innerText =
            "Item name is required";

          return;
        }

        generateBtn.disabled = true;

        generateBtn.innerText =
          "Generating...";

        loadingMsg.innerText =
          "Generating listing...";

        try {

         const {
  data: { session }
} = await window.supabaseClient.auth.getSession();

const response =
  await fetch("/api/generate", {

    method: "POST",

    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${session.access_token}`
    },

    body: JSON.stringify({
      itemName,
      condition,
      brand
    })

  });

          const data =
            await response.json();

          if (!response.ok) {

            errorMsg.innerText =
              data.error || "Failed to generate listing";

            return;
          }

          const listing = data.listing;

          titleContent.innerText =
            listing.title || "";

          descriptionContent.innerText =
            listing.description || "";

          priceContent.innerText =
            listing.price_range || "";

          tagsContent.innerText =
            listing.tags?.join(", ") || "";

          outputContainer.style.display =
            "flex";

        } catch (error) {

          console.error(error);

          errorMsg.innerText =
            "Failed to generate listing";

        } finally {

          generateBtn.disabled = false;

          generateBtn.innerText =
            "Generate Listing";

          loadingMsg.innerText = "";

        }

      });

      // RESET FORM

      newListingBtn.addEventListener("click", () => {

        itemNameInput.value = "";
        conditionInput.value = "";
        brandInput.value = "";

        itemCounter.innerText =
          "0 / 120";

        outputContainer.style.display =
          "none";

        errorMsg.innerText = "";
        loadingMsg.innerText = "";

      });

    });

 

  </script>

</body>
</html>
