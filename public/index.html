<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>CraftList AI Generator</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <style>

    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 700px;
      margin: auto;
      background: #f9f9f9;
      color: #333;
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      gap: 10px;
      flex-wrap: wrap;
    }

    .nav-buttons {
      display: flex;
      gap: 10px;
    }

    button {
      padding: 8px 14px;
      cursor: pointer;
      border: 1px solid #ccc;
      background: white;
      border-radius: 4px;
    }

    button:hover {
      background: #f0f0f0;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }

    input[type="text"] {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: white;
    }

    .char-counter {
      text-align: right;
      font-size: 12px;
      color: #777;
      margin-top: 3px;
    }

    .error {
      margin-top: 15px;
      color: red;
      font-weight: bold;
      text-align: center;
    }

    .loading {
      margin-top: 20px;
      font-style: italic;
      color: #666;
    }

    .output-container {
      margin-top: 25px;
      display: none;
      flex-direction: column;
      gap: 20px;
    }

    .field-container {
      background: white;
      border: 1px solid #ddd;
      border-radius: 5px;
      padding: 12px;
    }

    .field-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .field-title {
      font-weight: bold;
      font-size: 15px;
    }

    .copy-btn {
      cursor: pointer;
      border: none;
      background: transparent;
      font-size: 16px;
      padding: 0;
      width: 24px;
      height: 24px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .field-content {
      white-space: pre-wrap;
      line-height: 1.5;
    }

    #newListingBtn {
      margin-top: 10px;
    }

  </style>

</head>

<body>

  <div class="top-bar">

    <div>
      <strong>CraftList</strong>
    </div>

    <div class="nav-buttons">

      <button onclick="window.location.href='account.html'">
        Account
      </button>

      <button onclick="window.location.href='shop.html'">
        Shop
      </button>

      <button id="logoutBtn">
        Logout
      </button>

    </div>

  </div>

  <h1>AI Marketplace Listing Generator</h1>

  <label for="itemName">
    Item Name
  </label>

  <input
    type="text"
    id="itemName"
    maxlength="120"
    placeholder="Example: iPhone 14 Pro"
  />

  <div
    class="char-counter"
    id="itemCounter"
  >
    0 / 120
  </div>

  <label for="condition">
    Condition
  </label>

  <input
    type="text"
    id="condition"
    maxlength="60"
    placeholder="Example: Used - Excellent"
  />

  <label for="brand">
    Brand
  </label>

  <input
    type="text"
    id="brand"
    maxlength="60"
    placeholder="Example: Apple"
  />

  <button id="generateBtn">
    Generate Listing
  </button>

  <div
    class="error"
    id="errorMsg"
  ></div>

  <div
    class="loading"
    id="loadingMsg"
  ></div>

  <div
    class="output-container"
    id="outputContainer"
  >

    <div class="field-container">

      <div class="field-header">

        <div class="field-title">
          Title
        </div>

        <button
          class="copy-btn"
          onclick="copyField('titleContent')"
        >
          📋
        </button>

      </div>

      <div
        class="field-content"
        id="titleContent"
      ></div>

    </div>

    <div class="field-container">

      <div class="field-header">

        <div class="field-title">
          Description
        </div>

        <button
          class="copy-btn"
          onclick="copyField('descriptionContent')"
        >
          📋
        </button>

      </div>

      <div
        class="field-content"
        id="descriptionContent"
      ></div>

    </div>

    <div class="field-container">

      <div class="field-header">

        <div class="field-title">
          Price Range
        </div>

        <button
          class="copy-btn"
          onclick="copyField('priceContent')"
        >
          📋
        </button>

      </div>

      <div
        class="field-content"
        id="priceContent"
      ></div>

    </div>

    <div class="field-container">

      <div class="field-header">

        <div class="field-title">
          Tags
        </div>

        <button
          class="copy-btn"
          onclick="copyField('tagsContent')"
        >
          📋
        </button>

      </div>

      <div
        class="field-content"
        id="tagsContent"
      ></div>

    </div>

    <button id="newListingBtn">
      New Listing
    </button>

  </div>

  <script>

    document.addEventListener("DOMContentLoaded", async () => {

      const supabaseUrl =
        "https://umvpigxwceekndxnyrmi.supabase.co";

      const supabaseKey =
        "sb_publishable_4UiI7fMJCoGKUnbhzwYkTg_0_r8F2Vz";

      const supabase =
        window.supabase.createClient(
          supabaseUrl,
          supabaseKey
        );

      const {
        data: { session }
      } = await supabase.auth.getSession();

      if (!session) {

        window.location.href =
          "/login.html";

        return;
      }

      const itemNameInput =
        document.getElementById("itemName");

      const conditionInput =
        document.getElementById("condition");

      const brandInput =
        document.getElementById("brand");

      const itemCounter =
        document.getElementById("itemCounter");

      const generateBtn =
        document.getElementById("generateBtn");

      const logoutBtn =
        document.getElementById("logoutBtn");

      const errorMsg =
        document.getElementById("errorMsg");

      const loadingMsg =
        document.getElementById("loadingMsg");

      const outputContainer =
        document.getElementById("outputContainer");

      const titleContent =
        document.getElementById("titleContent");

      const descriptionContent =
        document.getElementById("descriptionContent");

      const priceContent =
        document.getElementById("priceContent");

      const tagsContent =
        document.getElementById("tagsContent");

      const newListingBtn =
        document.getElementById("newListingBtn");

      itemNameInput.addEventListener("input", () => {

        itemCounter.textContent =
          `${itemNameInput.value.length} / 120`;

      });

      window.copyField = function(id) {

        const text =
          document.getElementById(id).innerText;

        navigator.clipboard.writeText(text);

      };

      logoutBtn.addEventListener("click", async () => {

        await supabase.auth.signOut();

        window.location.href =
          "/login.html";

      });

      generateBtn.addEventListener("click", async () => {

        errorMsg.innerText = "";
        loadingMsg.innerText = "";

        const itemName =
          itemNameInput.value.trim();

        const condition =
          conditionInput.value.trim();

        const brand =
          brandInput.value.trim();

        if (!itemName) {

          errorMsg.innerText =
            "Item name is required";

          return;
        }

        if (itemName.length > 120) {

          errorMsg.innerText =
            "Item name too long";

          return;
        }

        generateBtn.disabled = true;

        generateBtn.innerText =
          "Generating...";

        loadingMsg.innerText =
          "Generating listing...";

        try {

          const response =
            await fetch("/api/generate", {

              method: "POST",

              headers: {
                "Content-Type": "application/json"
              },

              body: JSON.stringify({
                itemName,
                condition,
                brand
              })

            });

          const data =
            await response.json();

          if (!response.ok) {

            errorMsg.innerText =
              data.error ||
              "Failed to generate listing";

            return;
          }

          const listing =
            JSON.parse(data.listing);

          titleContent.innerText =
            listing.title || "";

          descriptionContent.innerText =
            listing.description || "";

          priceContent.innerText =
            listing.price_range || "";

          tagsContent.innerText =
            listing.tags?.join(", ") || "";

          outputContainer.style.display =
            "flex";

        } catch (error) {

          console.error(error);

          errorMsg.innerText =
            "Failed to generate listing";

        } finally {

          generateBtn.disabled = false;

          generateBtn.innerText =
            "Generate Listing";

          loadingMsg.innerText = "";

        }

      });

      newListingBtn.addEventListener("click", () => {

        itemNameInput.value = "";
        conditionInput.value = "";
        brandInput.value = "";

        itemCounter.innerText =
          "0 / 120";

        outputContainer.style.display =
          "none";

        errorMsg.innerText = "";
        loadingMsg.innerText = "";

      });

    });

  </script>

</body>
</html>
