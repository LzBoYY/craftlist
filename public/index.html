<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CraftList AI Generator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 600px;
      margin: auto;
      background: #f9f9f9;
    }
    h1 {
      text-align: center;
    }
    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      box-sizing: border-box;
    }
    button {
      margin-top: 10px;
      padding: 8px 16px;
      cursor: pointer;
    }
    .output-container {
      margin-top: 20px;
      background: #fff;
      padding: 15px;
      border: 1px solid #ddd;
      border-radius: 5px;
    }
    .field-group {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
    }
    .field-label {
      width: 100px;
      font-weight: bold;
    }
    .field-value {
      flex: 1;
      padding: 6px;
      border: 1px solid #ccc;
      border-radius: 3px;
      margin-right: 10px;
    }
    .loading {
      font-style: italic;
      color: #555;
    }
    .copy-btn {
      padding: 6px;
      font-size: 14px;
    }
    #newListingBtn {
      margin-top: 15px;
      background: #007bff;
      color: #fff;
      border: none;
      border-radius: 3px;
    }
    #newListingBtn:hover {
      background: #0056b3;
    }
    .error {
      color: red;
      font-weight: bold;
      margin-top: 10px;
    }
    .char-counter {
      font-size: 12px;
      color: #666;
      text-align: right;
    }
  </style>
</head>
<body>
  <h1>CraftList AI Generator</h1>

  <div>
    <label for="itemName">Item Name</label>
    <input type="text" id="itemName" maxlength="120" />
    <div class="char-counter" id="itemNameCounter">0 / 120</div>

    <label for="condition">Condition</label>
    <input type="text" id="condition" maxlength="60" placeholder="Used - Good" />

    <label for="brand">Brand</label>
    <input type="text" id="brand" maxlength="60" placeholder="Unknown" />

    <button id="generateBtn">Generate Listing</button>
    <div class="error" id="errorMsg"></div>
  </div>

  <div class="output-container" id="outputContainer" style="display:none;">
    <div class="field-group">
      <div class="field-label">Title</div>
      <div class="field-value" id="outputTitle"></div>
      <button class="copy-btn" onclick="copyText('outputTitle')">📋</button>
    </div>
    <div class="field-group">
      <div class="field-label">Description</div>
      <div class="field-value" id="outputDescription"></div>
      <button class="copy-btn" onclick="copyText('outputDescription')">📋</button>
    </div>
    <div class="field-group">
      <div class="field-label">Price Range</div>
      <div class="field-value" id="outputPrice"></div>
      <button class="copy-btn" onclick="copyText('outputPrice')">📋</button>
    </div>
    <div class="field-group">
      <div class="field-label">Tags</div>
      <div class="field-value" id="outputTags"></div>
      <button class="copy-btn" onclick="copyText('outputTags')">📋</button>
    </div>
    <button id="newListingBtn">New Listing</button>
  </div>

  <script>
    const itemNameInput = document.getElementById("itemName");
    const conditionInput = document.getElementById("condition");
    const brandInput = document.getElementById("brand");
    const generateBtn = document.getElementById("generateBtn");
    const errorMsg = document.getElementById("errorMsg");

    const outputContainer = document.getElementById("outputContainer");
    const outputTitle = document.getElementById("outputTitle");
    const outputDescription = document.getElementById("outputDescription");
    const outputPrice = document.getElementById("outputPrice");
    const outputTags = document.getElementById("outputTags");
    const newListingBtn = document.getElementById("newListingBtn");

    const itemNameCounter = document.getElementById("itemNameCounter");

    let isGenerating = false;

    itemNameInput.addEventListener("input", () => {
      itemNameCounter.textContent = `${itemNameInput.value.length} / 120`;
    });

    function copyText(id) {
      const text = document.getElementById(id).textContent;
      navigator.clipboard.writeText(text);
      alert("Copied!");
    }

    generateBtn.addEventListener("click", async () => {
      if (isGenerating) return;

      const itemName = itemNameInput.value.trim();
      const condition = conditionInput.value.trim();
      const brand = brandInput.value.trim();

      if (!itemName) {
        errorMsg.textContent = "Item name is required";
        return;
      }

      isGenerating = true;
      generateBtn.disabled = true;
      generateBtn.textContent = "Generating...";
      errorMsg.textContent = "";

      try {
        const response = await fetch("/api/generate", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ itemName, condition, brand })
        });

        const data = await response.json();

        if (data.error) {
          errorMsg.textContent = data.error;
          return;
        }

        let listing = data.listing;
        try {
          listing = JSON.parse(listing);
        } catch {
          // fallback in case AI response is not proper JSON
          errorMsg.textContent = "Invalid AI response";
          return;
        }

        outputTitle.textContent = listing.title || "";
        outputDescription.textContent = listing.description || "";
        outputPrice.textContent = listing.price_range || "";
        outputTags.textContent = (listing.tags || []).join(", ");

        outputContainer.style.display = "block";

      } catch (err) {
        console.error(err);
        errorMsg.textContent = "Failed to generate listing";
      } finally {
        isGenerating = false;
        generateBtn.disabled = false;
        generateBtn.textContent = "Generate Listing";
      }
    });

    newListingBtn.addEventListener("click", () => {
      outputContainer.style.display = "none";
      itemNameInput.value = "";
      conditionInput.value = "";
      brandInput.value = "";
      itemNameCounter.textContent = "0 / 120";
      errorMsg.textContent = "";
    });
  </script>
</body>
</html>
