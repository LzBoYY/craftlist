<!-- login.html -->

<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Login - CraftList</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <style>

    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 400px;
      margin: auto;
      background: #f9f9f9;
    }

    h1 {
      text-align: center;
      margin-bottom: 5px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 25px;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 10px;
      cursor: pointer;
      border: 1px solid #ccc;
      background: white;
      border-radius: 4px;
    }

    button:hover {
      background: #f0f0f0;
    }

    .link {
      margin-top: 15px;
      text-align: center;
      color: #007bff;
      cursor: pointer;
    }

    .error {
      color: red;
      margin-top: 15px;
      font-weight: bold;
      text-align: center;
    }

  </style>

</head>

<body>

  <h1>CraftList</h1>

  <div class="subtitle">
    Create marketplace listings in seconds.
  </div>

  <label for="email">
    Email Address
  </label>

  <input
    type="email"
    id="email"
    placeholder="Enter your email"
  />

  <label for="password">
    Password
  </label>

  <input
    type="password"
    id="password"
    placeholder="Enter your password"
  />

  <button id="loginBtn">
    Login
  </button>

  <div
    class="error"
    id="errorMsg"
  ></div>

  <div
    class="link"
    id="registerLink"
  >
    Create Account
  </div>

  <div
    class="link"
    id="forgotPasswordLink"
  >
    Forgot Password?
  </div>

 <script>

document.addEventListener("DOMContentLoaded", () => {

  const supabaseUrl =
    "https://umvpigxwceekndxnyrmi.supabase.co";

  const supabaseKey =
    "sb_publishable_4UiI7fMJCoGKUnbhzwYkTg_0_r8F2Vz";

  const supabase =
    window.supabase.createClient(
      supabaseUrl,
      supabaseKey
    );

  const loginBtn =
    document.getElementById("loginBtn");

  const registerLink =
    document.getElementById("registerLink");

  const forgotPasswordLink =
    document.getElementById("forgotPasswordLink");

  const emailInput =
    document.getElementById("email");

  const passwordInput =
    document.getElementById("password");

  const errorMsg =
    document.getElementById("errorMsg");

  // LOGIN FUNCTION (reusable)
  async function login() {

    errorMsg.innerText = "";

    const email = emailInput.value.trim();
    const password = passwordInput.value.trim();

    if (!email || !password) {
      errorMsg.innerText = "Please fill in all fields";
      return;
    }

    const { error } =
      await supabase.auth.signInWithPassword({
        email,
        password
      });

    if (error) {
      errorMsg.innerText = "Incorrect email or password";
      return;
    }

    window.location.href = "/index.html";
  }

  // BUTTON CLICK LOGIN
  loginBtn.addEventListener("click", async () => {
    await login();
  });

  // ENTER KEY LOGIN (THIS IS WHAT YOU WANTED)
  passwordInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      login();
    }
  });

  // LINKS
  registerLink.addEventListener("click", () => {
    window.location.href = "/register.html";
  });

  forgotPasswordLink.addEventListener("click", () => {
    window.location.href = "/forgot-password.html";
  });

});

</script>

</body>
</html>
