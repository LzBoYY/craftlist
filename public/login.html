<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - CraftList</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 400px;
      margin: auto;
      background: #f9f9f9;
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>Login Test</h1>

  <button id="loginBtn">
    Test Button
  </button>

  <script>
    document.addEventListener("DOMContentLoaded", () => {

      console.log("SCRIPT RUNNING");

      const btn =
        document.getElementById("loginBtn");

      if (!btn) {
        console.error("loginBtn NOT FOUND");
        return;
      }

      btn.onclick = () => {
        alert("LOGIN BUTTON WORKS");
      };

    });
  </script>

</body>
</html>
