<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - CraftList</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 400px;
      margin: auto;
      background: #f9f9f9;
    }

    h1 {
      text-align: center;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 10px;
      cursor: pointer;
    }

    .link {
      margin-top: 15px;
      text-align: center;
      color: #007bff;
      cursor: pointer;
    }

    .error {
      color: red;
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <h1>Login</h1>

  <label for="email">Email Address</label>
  <input
    type="email"
    id="email"
    placeholder="Enter your email"
  />

  <label for="password">Password</label>
  <input
    type="password"
    id="password"
    placeholder="Enter your password"
  />

  <button id="loginBtn">
    Login
  </button>

  <div class="error" id="errorMsg"></div>

  <div
    class="link"
    id="registerLink"
  >
    Create Account
  </div>

  <script>

    const loginBtn = document.getElementById("loginBtn");
    const registerLink = document.getElementById("registerLink");
    const errorMsg = document.getElementById("errorMsg");

    loginBtn.addEventListener("click", () => {

      const email =
        document.getElementById("email").value.trim();

      const password =
        document.getElementById("password").value.trim();

      if (!email || !password) {

        errorMsg.innerText =
          "Please fill in all fields";

        return;
      }

      // TEMP LOGIN
      // Later replaced with Supabase auth

      localStorage.setItem(
        "craftlist_logged_in",
        "true"
      );

      localStorage.setItem(
        "craftlist_email",
        email
      );

      window.location.href = "index.html";
    });

    registerLink.addEventListener("click", () => {

      window.location.href = "register.html";
    });

  </script>

</body>
</html>
