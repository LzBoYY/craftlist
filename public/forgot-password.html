<!-- forgot-password.html -->

<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Forgot Password - CraftList</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <style>

    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 400px;
      margin: auto;
      background: #f9f9f9;
    }

    h1 {
      text-align: center;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 10px;
      cursor: pointer;
      border: 1px solid #ccc;
      background: white;
      border-radius: 4px;
    }

    .message {
      margin-top: 15px;
      text-align: center;
      font-weight: bold;
    }

    .link {
      margin-top: 15px;
      text-align: center;
      color: #007bff;
      cursor: pointer;
    }

  </style>

</head>

<body>

  <h1>Reset Password</h1>

  <label for="email">
    Email Address
  </label>

  <input
    type="email"
    id="email"
    placeholder="Enter your email"
  />

  <button id="resetBtn">
    Send Reset Email
  </button>

  <div
    class="message"
    id="message"
  ></div>

  <div
    class="link"
    id="backLink"
  >
    Back To Login
  </div>

  <script>

    document.addEventListener("DOMContentLoaded", () => {

      const supabaseUrl =
        "https://umvpigxwceekndxnyrmi.supabase.co";

      const supabaseKey =
        "sb_publishable_4UiI7fMJCoGKUnbhzwYkTg_0_r8F2Vz";

      const supabase =
        window.supabase.createClient(
          supabaseUrl,
          supabaseKey
        );

      const resetBtn =
        document.getElementById("resetBtn");

      const message =
        document.getElementById("message");

      const backLink =
        document.getElementById("backLink");

      resetBtn.addEventListener("click", async () => {

        message.innerText = "";

        const email =
          document
            .getElementById("email")
            .value
            .trim();

        if (!email) {

          message.innerText =
            "Please enter your email";

          return;
        }

        const { error } =
          await supabase.auth.resetPasswordForEmail(
            email,
            {
              redirectTo:
                "https://craftlist-g8xw-git-main-dimitri-s-projects2.vercel.app/reset-password.html"
            }
          );

        if (error) {

          message.innerText =
            error.message;

          return;
        }

        message.innerText =
          "Password reset email sent";

      });

      backLink.addEventListener("click", () => {

        window.location.href =
          "/login.html";

      });

    });

  </script>

</body>
</html>
